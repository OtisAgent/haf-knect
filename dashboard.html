<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAF KNECT — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="k3-s1.css">
<link rel="stylesheet" href="k3-s2.css">
<link rel="stylesheet" href="k3-s3.css">
<link rel="stylesheet" href="k3-s4.css">
<style>
#vbadge{position:fixed;bottom:12px;right:14px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--muted);background:var(--panel-2);border:1px solid var(--line-strong);border-radius:6px;padding:3px 8px;z-index:999;pointer-events:none}
</style>
<script>
// Auth guard — redirect to login if no session
if(sessionStorage.getItem('knect_access')!=='1'){
  window.location.replace('login.html');
}
</script>
</head>
<body>

<!-- ACCESS GATE (fallback, normally hidden) -->
<div id="gate" style="display:none">
  <div class="gate-box">
    <div class="gate-logo">HAF</div>
    <div class="gate-title">KNECT Platform</div>
    <div class="gate-sub">Business accounts, drivers and ops — log in below.</div>
    <input id="gate-user" class="gate-input" type="text" placeholder="Username" autocomplete="username" style="margin-bottom:10px;letter-spacing:normal;text-align:left;"/>
    <input id="gate-input" class="gate-input" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="gate-btn" onclick="gateAttempt()">Continue →</button>
    <div id="gate-err" class="gate-err" style="display:none">Incorrect credentials. Try again.</div>
  </div>
</div>

<!-- MAIN SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">HAF KNECT</div>
      <div class="topbar-product" id="topbar-product">Select role</div>
    </div>
    <div class="topbar-right">
      <div class="role-chip" id="role-chip" style="display:none"></div>
      <button class="login-btn" id="topbar-login" onclick="showGate()" style="display:none">Login →</button>
      <button class="signout-btn" id="topbar-signout" onclick="signOut()" style="display:none">Sign out</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="vbadge">v3.5.5</div>

<script src="core.js"></script>
<script src="screens-a.js"></script>
<script src="screens-b.js"></script>
<script src="biz-a.js"></script>
<script src="biz-b.js"></script>
<script src="biz-c.js"></script>
<script src="biz-d.js"></script>
<script src="biz-e.js"></script>
<script>
// Role-param routing — overrides core.js default after unlock
(function(){
  var params=new URLSearchParams(window.location.search);
  var role=params.get('role');
  var roleMap={driver:'dash-driver',business:'dash-business',freight:'dash-freight',admin:'dash-admin',customer:'dash-customer',ops:'dash-ops',compliance:'dash-compliance'};
  if(role&&roleMap[role]){
    S.role=role;
    render(roleMap[role]);
    var chip=document.getElementById('role-chip');
    if(chip){chip.textContent=role.charAt(0).toUpperCase()+role.slice(1);chip.style.display='inline-flex';}
    var prod=document.getElementById('topbar-product');
    if(prod)prod.textContent=role.charAt(0).toUpperCase()+role.slice(1)+' view';
  }
})();
</script>
</body>
</html>

<script>
/* ── PRICING ── */
const VAN={small:{n:'Small van',min:25,ppm:.48},swb:{n:'Short wheelbase',min:32,ppm:.62},lwb:{n:'Long wheelbase',min:40,ppm:.78},xlwb:{n:'Extra long wheelbase',min:50,ppm:.94},luton:{n:'Luton van',min:65,ppm:1.15}};
const URG={flex:{n:'Flexible',m:1},sday:{n:'Same-day',m:1.22},urg:{n:'Urgent',m:1.45},timed:{n:'Timed delivery',m:1.30}};
const PC={M:[53.48,-2.24],LS:[53.80,-1.55],S:[53.38,-1.47],B:[52.48,-1.90],L:[53.41,-2.98],E:[51.52,-0.05],N:[51.55,-0.10],W:[51.51,-0.20],SE:[51.48,-0.05],SW:[51.46,-0.18],NW:[51.55,-0.16],WA:[53.39,-2.60],SK:[53.41,-2.16],NG:[52.95,-1.15],DE:[52.92,-1.48],CV:[52.41,-1.51],LE:[52.63,-1.13],G:[55.86,-4.25],EH:[55.95,-3.19],CF:[51.48,-3.18],BS:[51.45,-2.60],OX:[51.75,-1.26],CB:[52.21,.12],YO:[53.96,-1.08],HU:[53.74,-.34],DN:[53.52,-1.13],BD:[53.80,-1.75],WF:[53.68,-1.50],SR:[54.91,-1.39],NE:[54.97,-1.61],TS:[54.60,-1.23],LA:[54.05,-2.80],PE:[52.57,-.24],IP:[52.06,1.16]};
function pcArea(s){return(s.trim().match(/^[A-Z]+/i)||['M'])[0].toUpperCase()}
function pcDist(a,b){const ca=PC[pcArea(a)]||[52.5,-1.5],cb=PC[pcArea(b)]||[53.0,-1.0];const R=3959,dLa=(cb[0]-ca[0])*Math.PI/180,dLo=(cb[1]-ca[1])*Math.PI/180;const x=Math.sin(dLa/2)**2+Math.cos(ca[0]*Math.PI/180)*Math.cos(cb[0]*Math.PI/180)*Math.sin(dLo/2)**2;return Math.round(2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))||28;}
function zoneMult(m){return m<30?1:m<80?1.04:m<150?1.08:1.12}

/* ── THEME ── */
function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'':'dark');

  const sun='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  ['theme-ico','app-theme-ico'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=dark?moon:sun;});
}

/* ── LIVE PRICE CALCULATOR ── */
const VAN_LABELS={small:'Small box',swb:'Half van',lwb:'Full van',luton:'XL Van or Special'};
let selVanKey='lwb';

function selVan(el,key){
  document.querySelectorAll('#van-pills .vp').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  selVanKey=key;
  calcLivePrice();
}

let pcTimer=null;
function onPcInput(){clearTimeout(pcTimer);pcTimer=setTimeout(calcLivePrice,600);}

function calcLivePrice(){
  const fr=document.getElementById('pc-from').value.trim().toUpperCase();
  const to=document.getElementById('pc-to').value.trim().toUpperCase();
  const box=document.getElementById('lp-box');
  const hint=document.getElementById('lp-hint-txt');
  const priced=document.getElementById('lp-priced');
  if(!fr||!to||fr.length<2||to.length<2){
    box.className='lp-box hint';
    hint.style.display='';
    priced.style.display='none';
    return;
  }
  const v=VAN[selVanKey]||VAN.lwb;
  const miles=pcDist(fr,to);
  const base=Math.max(v.min,miles*v.ppm*zoneMult(miles));
  const lo=Math.round(base*.9),hi=Math.round(base*1.1);
  document.getElementById('lp-range').textContent='£'+lo+'–£'+hi;
  document.getElementById('lp-info').textContent=(VAN_LABELS[selVanKey]||v.n)+' · '+fr+' → '+to+' · est. '+miles+' mi · ±10%';
  box.className='lp-box priced';
  hint.style.display='none';
  priced.style.display='flex';
  priced.style.flexDirection='column';
}

document.getElementById('pc-from').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pc-to').focus();});
document.getElementById('pc-to').addEventListener('keydown',e=>{if(e.key==='Enter')calcLivePrice();});

function toggleTrack(){
  const p=document.getElementById('track-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))document.getElementById('track-ref').focus();
}
const TRACK={'HAF-2847':{status:'Delivered',route:'Manchester → Leeds · 5 Jul 2026'},'HAF-2831':{status:'In transit',route:'Birmingham → Nottingham · 8 Jul 2026'},'HAF-2853':{status:'Driver assigned',route:'Manchester M1 → Salford M50 · Today'}};
function doTrack(){
  const ref=document.getElementById('track-ref').value.trim().toUpperCase();
  const lj=(typeof kjGet==='function')?kjGet(ref):null;
  const d=lj?{status:KJ_LBL[lj.status],route:lj.route+' · '+lj.det}:TRACK[ref];
  const r=document.getElementById('track-result');
  document.getElementById('tr-ref').textContent=ref||'No reference entered';
  document.getElementById('tr-status').textContent=d?d.status:'No delivery found';
  document.getElementById('tr-route').textContent=d?d.route:'Check the reference and try again.';
  r.classList.add('show');
}

/* ── CUSTOMER FLOWS (inline, no modal) ── */
const FLOW_TITLES={fast:'Fast Quote',repeat:'Repeat an order',pick:'HAF Pick'};
function openFlow(type){
  document.getElementById('tiles-wrap').style.display='none';
  document.getElementById('inline-flow').style.display='block';
  ['fast','repeat','pick'].forEach(t=>{
    document.getElementById('if-'+t).style.display=t===type?'block':'none';
  });
  document.getElementById('if-title').textContent=FLOW_TITLES[type]||'';
  document.getElementById('inline-flow').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeInlineFlow(){
  document.getElementById('inline-flow').style.display='none';
  document.getElementById('tiles-wrap').style.display='block';
  ['fast','repeat','pick'].forEach(t=>{
    const wrap=document.getElementById('if-'+t);
    if(!wrap)return;
    wrap.querySelectorAll('.fstep').forEach(s=>s.classList.remove('on'));
    const first=wrap.querySelector('.fstep');
    if(first)first.classList.add('on');
  });
}

/* FAST QUOTE */
const fqData={};
function fqStep(n){
  document.querySelectorAll('#if-fast .fstep').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('fq-'+n);if(el)el.classList.add('on');
}
function fqSel(el,key,val){
  const g=el.closest('.ogrid');
  if(g)g.querySelectorAll('.oopt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');fqData[key]=val;
}
function fqToggle(el,key){el.classList.toggle('sel');fqData[key]=el.classList.contains('sel');}
function fqCalcPrice(){
  const fr=(document.getElementById('fq-from').value||'M1').trim().toUpperCase();
  const to=(document.getElementById('fq-to').value||'LS1').trim().toUpperCase();
  const vk=fqData.van||'lwb';
  const uk=fqData.urg||'flex';
  const v=VAN[vk]||VAN.lwb;
  const u=URG[uk]||URG.flex;
  const miles=pcDist(fr,to);
  const base=Math.max(v.min,miles*v.ppm*u.m*zoneMult(miles));
  return{lo:Math.round(base*.9),hi:Math.round(base*1.1),miles,v,u,fr,to};
}
function fqShowPrice(){
  const r=fqCalcPrice();
  document.getElementById('fq-pr-range').textContent='£'+r.lo+'–£'+r.hi;
  document.getElementById('fq-pr-basis').textContent=r.v.n+' · '+r.fr+' → '+r.to+' · ~'+r.miles+' mi · '+r.u.n;
  fqStep(6);
}
function fqBook(){
  const ref='HAF-'+(Math.floor(Math.random()*9000)+1000);
  document.getElementById('fq-ref').textContent=ref;
  try{const r=fqCalcPrice();kjAdd(ref,r.fr+' → '+r.to,r.v.n+' · ~'+r.miles+' mi · fast quote','£'+r.lo+'–£'+r.hi);}catch(e){kjAdd(ref,'New booking','Details to follow','£—');}
  fqStep('done');
}

/* HAF PICK */
const hpData={};
const LOAD_VAN={boxes:'small',van:'lwb',big:'swb',pallet:'luton'};
function hpStep(n){
  document.querySelectorAll('#if-pick .fstep').forEach(s=>s.classList.remove('on'));

}
function hpSel(el,key,val){

  if(g)g.querySelectorAll('.oopt').forEach(b=>b.classList.remove('sel'));

}
function hpEstimate(){
  const fr=(document.getElementById('hp-from').value||'M1').trim().toUpperCase();
  const to=(document.getElementById('hp-to').value||'LS1').trim().toUpperCase();
  const vk=LOAD_VAN[hpData.load||'van']||'lwb';
  const v=VAN[vk];
  const miles=pcDist(fr,to);
  const base=Math.max(v.min,miles*v.ppm*zoneMult(miles));
  const lo=Math.round(base*.9),hi=Math.round(base*1.1);
  document.getElementById('hp-van-rec').textContent=v.n+' — HAF recommended';
  document.getElementById('hp-pr-range').textContent='£'+lo+'–£'+hi;
  document.getElementById('hp-pr-basis').textContent=fr+' → '+to+' · est. '+miles+' mi';
  hpStep(4);
}
function hpBook(){
  const ref='HAF-'+(Math.floor(Math.random()*9000)+1000);
  document.getElementById('hp-ref').textContent=ref;
  const fr=(document.getElementById('hp-from').value||'M1').trim().toUpperCase();
  const to=(document.getElementById('hp-to').value||'LS1').trim().toUpperCase();
  kjAdd(ref,fr+' → '+to,(document.getElementById('hp-van-rec').textContent||'Van')+' · HAF Pick',document.getElementById('hp-pr-range').textContent||'£—');
  hpStep('done');
}

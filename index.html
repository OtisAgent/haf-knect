<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAF KNECT — Demo</title>
<link rel="stylesheet" href="styles.css">
<style>
#dl{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9990;}
.dlw{text-align:center;max-width:640px;width:94%;padding:0 16px;}
.dle{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.dll{font-size:44px;font-weight:900;color:var(--orange);letter-spacing:-2px;margin-bottom:6px;}
.dls{font-size:14px;color:var(--muted);margin-bottom:34px;}
.dlg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;text-align:left;margin-bottom:28px;}
.dlt{background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:22px 18px;cursor:pointer;transition:border-color .15s;width:100%;}
.dlt:hover{border-color:var(--orange);}
.dli{font-size:28px;margin-bottom:10px;}
.dln{font-size:13px;font-weight:800;margin-bottom:4px;}
.dld{font-size:11px;color:var(--muted);line-height:1.5;}
.dla{font-size:11px;color:var(--sub);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;}
#am{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9995;}
.amc{background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:40px;max-width:360px;width:90%;text-align:center;position:relative;}
.amx{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;font-family:inherit;}
.ami{width:100%;padding:11px 13px;font-size:14px;border-radius:8px;border:1.5px solid var(--line);background:var(--bg);color:var(--text);outline:none;font-family:inherit;margin-bottom:12px;}
.ami:focus{border-color:var(--orange);}
.amb{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<div id="vbadge">v3.0</div>

<!-- DEMO LANDING -->
<div id="dl">
  <div class="dlw">
    <div class="dle">HAF Ecosystem</div>
    <div class="dll">KNECT</div>
    <div class="dls">Pick an account type to explore the platform — each view shows only what that user sees.</div>
    <div class="dlg">
      <button class="dlt" onclick="launchDemo('driver','Driver &mdash; Active','var(--green)','dash-driver')">
        <div class="dli">🚚</div>
        <div class="dln">Driver — Active</div>
        <div class="dld">Green CleverPay. Jobs unlocked, PLNA Pro tier active.</div>
      </button>
      <button class="dlt" onclick="launchDemo('business','Business Account','var(--purple)','dash-business')">
        <div class="dli">🏢</div>
        <div class="dln">Business Account</div>
        <div class="dld">Moving own goods. Business dashboard and rebate pricing.</div>
      </button>
      <button class="dlt" onclick="launchDemo('freight','Freight Forwarder','var(--amber)','dash-freight')">
        <div class="dli">🚛</div>
        <div class="dln">Freight Forwarder</div>
        <div class="dld">Third-party loads. Post a Load and network fee management.</div>
      </button>
    </div>
    <button class="dla" onclick="document.getElementById('am').style.display='flex'">Admin sign in →</button>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="am">
  <div class="amc">
    <button class="amx" onclick="document.getElementById('am').style.display='none'">✕</button>
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;">HAF Admin</div>
    <div style="font-size:26px;font-weight:900;color:var(--orange);margin-bottom:24px;">KNECT</div>
    <div style="text-align:left;">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;">Username</label>
      <input id="au" class="ami" type="text" placeholder="BF638793" autocomplete="username" autocapitalize="characters"/>
      <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;">Password</label>
      <input id="ap" class="ami" type="password" placeholder="••••••••" autocomplete="current-password" style="margin-bottom:16px;"/>
    </div>
    <button class="amb" onclick="adminSignIn()">Sign in →</button>
    <div id="ae" style="display:none;color:var(--red);font-size:12px;margin-top:10px;">Incorrect credentials.</div>
  </div>
</div>

<!-- GATE (hidden — required by core.js event listeners) -->
<div id="gate" style="display:none">
  <input id="gate-user" type="text"/>
  <input id="gate-input" type="password"/>
  <div id="gate-err" style="display:none"></div>
</div>

<!-- MAIN SHELL -->
<div id="shell" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">HAF KNECT</div>
      <div class="topbar-product" id="topbar-product"></div>
    </div>
    <div class="topbar-right">
      <div class="role-chip" id="role-chip" style="display:none"></div>
      <button class="login-btn" id="topbar-login" style="display:none">Login →</button>
      <button class="signout-btn" id="topbar-signout" onclick="goBack()" style="display:inline-flex;display:none">← Demo</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<script src="core.js"></script>
<script src="screens-a.js"></script>
<script src="screens-b.js"></script>
<script src="biz-a.js"></script>
<script src="biz-b.js"></script>
<script src="biz-c.js"></script>
<script src="biz-d.js"></script>
<script src="biz-e.js"></script>
<script>
function launchDemo(role,label,color,screen){
  setRole(role,label,color);
  KNECT_MASTER=false;
  document.getElementById('dl').style.display='none';
  document.getElementById('shell').style.display='block';
  document.getElementById('topbar-signout').style.display='inline-flex';
  render(screen);
}
function adminSignIn(){
  var u=document.getElementById('au').value.trim().toUpperCase();
  var p=document.getElementById('ap').value.trim();
  if(u==='BF638793'&&p==='Harps0641!'){
    KNECT_MASTER=true;
    document.getElementById('am').style.display='none';
    document.getElementById('dl').style.display='none';
    document.getElementById('shell').style.display='block';
    document.getElementById('topbar-signout').style.display='inline-flex';
    S.role='admin';
    render('dash-admin');
  } else {
    document.getElementById('ae').style.display='block';
    document.getElementById('ap').value='';
  }
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('ap').addEventListener('keydown',function(e){if(e.key==='Enter')adminSignIn();});
});
function goBack(){
  document.getElementById('shell').style.display='none';
  document.getElementById('dl').style.display='flex';
  document.getElementById('topbar-signout').style.display='none';
  KNECT_MASTER=false;
  S={role:null,username:null,name:null,step:'select-role'};
}
</script>
</body>
</html>
